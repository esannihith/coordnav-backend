# Local dev:  docker compose up --build          (app only, on 127.0.0.1:8000)
# Production: docker compose --profile prod up -d --build
#             (adds Caddy: TLS termination for $DOMAIN -> app:8000)
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"

  caddy:
    image: caddy:2
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env for the prod profile}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
